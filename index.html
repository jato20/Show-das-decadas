<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show das Décadas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="tela-perfil" class="tela active">
            <h1>Show das Décadas</h1>
            <div class="box">
                <input type="text" id="input-nome" placeholder="Digite seu nome...">
                <select id="select-traje">
                    <option value="Iniciante">👕 Iniciante</option>
                    <option value="Anos 50" id="traje-50" disabled>🕺 Anos 50 (Bloqueado)</option>
                    <option value="Anos 70" id="traje-70" disabled>🌈 Anos 70 (Bloqueado)</option>
                    <option value="Anos 90" id="traje-90" disabled>🕶️ Anos 90 (Bloqueado)</option>
                </select>
            </div>
            <button id="btn-salvar" class="btn-principal">Começar Jornada</button>
        </div>

        <div id="tela-selecao" class="tela">
            <h2 id="boas-vindas"></h2>
            <p>Escolha o período:</p>
            <button class="btn-decada" data-decada="5060">Anos 50 e 60</button>
            <button class="btn-decada" data-decada="7080">Anos 70 e 80</button>
            <button class="btn-decada" data-decada="9000">Anos 90 e 00</button>
        </div>

        <div id="tela-pergunta" class="tela">
            <div class="header-jogo">
                <div class="player-info">
                    <span id="nome-p"></span> | <small id="traje-p"></small>
                </div>
                <div class="money">R$ <span id="premio-txt">0</span></div>
            </div>
            <div id="caixa-pergunta">
                <h2 id="txt-pergunta"></h2>
                <div id="lista-respostas"></div>
            </div>
            <div class="controles-ajuda">
                <button id="ajuda-cartas">🃏 Cartas</button>
                <button id="ajuda-univ">🎓 Univ.</button>
                <button id="ajuda-pulo">⏭️ Pular</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
