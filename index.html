<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show das Décadas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="tela-login" class="tela active">
            <h1>Show das Décadas</h1>
            <div class="box-login">
                <p>Bem-vindo! Digite seu nome para começar:</p>
                <input type="text" id="input-nome-inicial" placeholder="Seu nome aqui...">
                <button id="btn-entrar" onclick="entrarNoJogo()">ENTRAR NO JOGO</button>
            </div>
        </div>

        <div id="tela-menu" class="tela">
            <div id="header-perfil">
                <div>Olá, <b id="nome-perfil">Viajante</b></div>
                <div>🪙 <span id="saldo-moedas">0</span></div>
            </div>
            
            <p style="margin: 20px 0;">Escolha uma época:</p>
            <button onclick="iniciarJogo('5060')">Anos 50 e 60</button>
            <button onclick="iniciarJogo('7080')">Anos 70 e 80</button>
            <button onclick="iniciarJogo('9000')">Anos 90 e 00</button>
            
            <hr>
            <div style="display: flex; gap: 10px;">
                <button onclick="mudarTela('tela-stats')" style="background: #00aaff !important;">🏆 Stats</button>
                <button onclick="sairJogo()" style="background: #666 !important;">Sair</button>
            </div>
        </div>

        <div id="tela-stats" class="tela">
            <h2>🏆 Recordes</h2>
            <div id="placar-lideres" class="box-stats"></div>
            <button onclick="mudarTela('tela-menu')">⬅ Voltar</button>
        </div>

        <div id="tela-pergunta" class="tela">
            <div class="status-jogo">Prêmio: R$ <b id="premio-txt">0</b></div>
            <h3 id="txt-pergunta"></h3>
            <div id="lista-respostas"></div>
            <button onclick="mudarTela('tela-menu')" style="background: #cc0000 !important; color: #fff;">Desistir</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
