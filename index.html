<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show das Décadas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="tela-selecao">
            <h1>Show das Décadas</h1>
            <p>Escolha uma época para começar:</p>
            <button class="btn-inicio" onclick="iniciarJogo('5060')">Anos 50 e 60</button>
            <button class="btn-inicio" onclick="iniciarJogo('7080')">Anos 70 e 80</button>
            <button class="btn-inicio" onclick="iniciarJogo('9000')">Anos 90 e 00</button>
        </div>

        <div id="tela-pergunta" style="display:none;">
            <div id="status-topo">
                <p class="dinheiro">R$ <span id="valor-premio">0</span></p>
                <p class="placar">Fase: <span id="fase-num">1</span></p>
            </div>

            <h2 id="pergunta-texto">Carregando pergunta...</h2>

            <div id="alternativas"></div>

            <div id="ajudas">
                <button id="btn-cartas" class="btn-ajuda" onclick="ajudaCartas()">🃏 Cartas</button>
                <button id="btn-universitarios" class="btn-ajuda" onclick="ajudaUniversitarios()">🎓 Univ.</button>
                <button id="btn-pular" class="btn-ajuda" onclick="ajudaPular()">⏭️ Pular</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
