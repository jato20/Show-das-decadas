<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show das Décadas - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="tela-perfil">
            <h1>Show das Décadas</h1>
            <div class="config-box">
                <input type="text" id="input-nome" placeholder="Digite seu nome...">
                <p>Escolha seu Traje:</p>
                <select id="select-traje">
                    <option value="Iniciante">👕 Iniciante</option>
                    <option value="Boy da Brilhantina" id="traje-50" disabled>🕺 Anos 50 (Bloqueado)</option>
                    <option value="Disco Star" id="traje-70" disabled>🌈 Anos 70 (Bloqueado)</option>
                    <option value="Cyber Hacker" id="traje-90" disabled>🕶️ Anos 90 (Bloqueado)</option>
                </select>
            </div>
            <button class="btn-inicio" onclick="irParaSelecao()">Salvar e Continuar</button>
        </div>

        <div id="tela-selecao" style="display:none;">
            <p id="boas-vindas"></p>
            <h2>Escolha a Década:</h2>
            <button onclick="iniciarJogo('5060')">Anos 50 e 60</button>
            <button onclick="iniciarJogo('7080')">Anos 70 e 80</button>
            <button onclick="iniciarJogo('9000')">Anos 90 e 00</button>
        </div>

        <div id="tela-pergunta" style="display:none;">
            <div id="status-topo">
                <div>
                    <span id="player-tag"></span><br>
                    <small id="traje-tag"></small>
                </div>
                <div class="dinheiro">R$ <span id="valor-premio">0</span></div>
            </div>
            <h2 id="pergunta-texto">Carregando...</h2>
            <div id="alternativas"></div>
            <div id="ajudas">
                <button id="btn-cartas" class="btn-ajuda" onclick="ajudaCartas()">🃏 Cartas</button>
                <button id="btn-universitarios" class="btn-ajuda" onclick="ajudaUniversitarios()">🎓 Univ.</button>
                <button id="btn-pular" class="btn-ajuda" onclick="ajudaPular()">⏭️ Pular</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
